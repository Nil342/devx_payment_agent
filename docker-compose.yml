version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: workspace_backend
    environment:
      - NODE_ENV=production
      - PORT=4000
    # Additional required environment variables (e.g. GEMINI_API_KEY, GROQ_API_KEY)
    # can be loaded from an env file or injected here.
    env_file:
      - .env
    ports:
      - "4001:4000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: workspace_frontend
    ports:
      - "8888:80"
    depends_on:
      - backend
    restart: unless-stopped
