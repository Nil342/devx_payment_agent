kind = "web"
previewPath = "/"
title = "AP Agent"
version = "1.0.0"
id = "artifacts/ap-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23635

[services.development]
run = "pnpm --filter @workspace/ap-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ap-agent", "run", "build" ]
publicDir = "artifacts/ap-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23635"
BASE_PATH = "/"
